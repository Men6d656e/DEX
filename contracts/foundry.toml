[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.27"
evm_version = "cancun"

# Optimizer settings
optimizer = true
optimizer_runs = 200

# Extra output for storage layout (useful for upgrades validation)
extra_output = ["storageLayout"]

# Fuzz testing settings
[fuzz]
runs = 256
max_test_rejects = 65536
dictionary_weight = 40
include_storage = true
include_push_bytes = true

# Invariant testing settings
[invariant]
runs = 256
depth = 15
fail_on_revert = false
call_override = false

# RPC endpoints for deployment
[rpc_endpoints]
anvil = "http://127.0.0.1:8545"
sepolia = "${SEPOLIA_RPC_URL}"
